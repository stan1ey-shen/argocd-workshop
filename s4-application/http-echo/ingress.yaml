apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: http-echo
  namespace: gorilla
spec:
  ingressClassName: nginx
  rules:
    - host: argocd-workshop-s4.192.168.4.154.sslip.io
      http:
        paths:
          - backend:
              service:
                name: s4-application-http-echo-svc
                port:
                  number: 80
            path: /
            pathType: Prefix
