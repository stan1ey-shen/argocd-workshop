apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s1b-application
  namespace: infra-argocd
spec:
  # The project the application belongs to.
  project: default
  source:
    # Can point to either a Helm chart repo or a git repo.
    repoURL: https://stefanprodan.github.io/podinfo
    # For Helm, this refers to the chart version.
    targetRevision: 6.10.2
    # helm specific config
    chart: podinfo
    helm:
      releaseName: s1b-application
      parameters:
        - name: "ui.message"
          value: "ArgoCD Workshop Sample 1b"
        - name: "ingress.enabled"
          value: "true"
        - name: "ingress.className"
          value: "nginx"
        - name: "ingress.hosts[0].host"
          value: "argocd-workshop-s1b"
        - name: "ingress.hosts[0].paths[0].path"
          value: "/"
        - name: "ingress.hosts[0].paths[0].pathType"
          value: "Prefix"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gorilla
  syncPolicy:
    automated: # automated sync by default retries failed attempts 5 times with following delays between attempts ( 5s, 10s, 20s, 40s, 80s ); retry controlled using `retry` field.
      enabled: true # Enables automated syncing of the application ( true by default ).
      prune: true # Specifies if resources should be pruned during auto-syncing ( false by default ).
      selfHeal: true # Specifies if partial app sync should be executed when resources are changed only in target Kubernetes cluster and no git change detected ( false by default ).
      allowEmpty: false # Allows deleting all application resources during automatic syncing ( false by default ).
    syncOptions:
      - CreateNamespace=true
